const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "purple",
  "density": "cozy",
  "layout": "compact",
  "showWhy": true
}/*EDITMODE-END*/;

// Preview/demo bypass — also gates the View-as pill so non-managers can use it
// on localhost or the preview sandbox without an authed session.
const isPreview = window.location.hostname.includes('claudeusercontent.com')
  || window.location.hostname === 'localhost'
  || new URLSearchParams(window.location.search).get('demo') === 'true';
// Expose so data layers (e.g. attainment) can show sample data in the design
// sandbox without ever fabricating numbers for a real signed-in rep in prod.
window.IS_PREVIEW = isPreview;

function App({ authedUser, preloadedState }) {
  // Supabase-backed when configured; falls back to localStorage otherwise.
  const useCloud = !!window.SUPABASE_CONFIGURED;

  // Dev "view as" — switch perspective without signing out.
  const [devViewAs, setDevViewAs] = React.useState(null);
  const [viewAsOpen, setViewAsOpen] = React.useState(false);
  const effectiveUser = devViewAs || authedUser;

  const isManager = canManageAny(effectiveUser);
  const myRepId = effectiveUser ? (effectiveUser.rep_id || "") : "";

  // RFC-151 Phase 4: workspace (team) scoping. The global manager can switch
  // between team workspaces; a single-team admin (Lara) or rep has exactly
  // one and lands in it — no switcher rendered. The stored choice is clamped
  // to teamsForUser so a stale/foreign selection can never widen a view.
  const myTeams = teamsForUser(effectiveUser);
  const [wsChoice, setWsChoice] = useState(() => {
    try { return localStorage.getItem("mtk-workspace-v1") || ""; } catch { return ""; }
  });
  const activeTeam = myTeams.includes(wsChoice) ? wsChoice : defaultTeamForUser(effectiveUser);
  const activeTeamObj = TEAMS.find(t => t.id === activeTeam) || TEAMS[0];

  // Seed from AuthGate's parallel preload when available, else localStorage.
  const [state, setState] = useState(() => preloadedState || loadState());
  // Standup fills (for the auto "Daily Standup" deliverable) are loaded
  // separately and merged in below — keeping them OUT of `state` means realtime
  // state replacements + localStorage persistence never clobber them.
  const [standupFills, setStandupFills] = useState({});
  // Everyone lands on the home screen
  const [view, setView] = useState("home");
  const [weekIdx, setWeekIdx] = useState(currentWeekIndex());
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  // If preloadedState is already in hand, we don't need a second cloud fetch
  // to consider the app "ready."
  const [cloudReady, setCloudReady] = useState(!useCloud || !!preloadedState);

  // Read-only when viewing someone else's week (not your own, not manager)
  const isReadOnly = effectiveUser && view !== "rollup" && view !== myRepId && !isManager;

  // Switch workspace; if the current view is a rep from the team being left,
  // land back on home rather than stranding a cross-team rep view.
  const setActiveTeam = (id) => {
    setWsChoice(id);
    try { localStorage.setItem("mtk-workspace-v1", id); } catch (e) {}
    const viewRep = REPS.find(r => r.id === view);
    if (viewRep && viewRep.team !== id) setView("home");
  };

  // Boot: if cloud, migrate-once → (load unless prefetched) → subscribe to realtime
  useEffect(() => {
    if (!useCloud) return;
    let unsubscribe = () => {};
    let cancelled = false;
    (async () => {
      try {
        await window.migrateLocalToSupabase();
        // Skip the initial fetch if AuthGate already preloaded it.
        if (!preloadedState) {
          const fresh = await window.loadStateFromSupabase();
          if (cancelled) return;
          setState(fresh);
        }
        setCloudReady(true);
        unsubscribe = window.subscribeRealtime(async () => {
          const next = await window.loadStateFromSupabase();
          setState(next);
        });
      } catch (e) {
        console.error("supabase boot failed, falling back to local:", e);
        setCloudReady(true);
      }
    })();
    return () => unsubscribe();
  }, [useCloud]);

  // Persist locally whenever state changes (offline cache + non-cloud mode)
  useEffect(() => { saveState(state); }, [state]);

  // Load standup fills (auto "Daily Standup" completion). Refreshed when the
  // view or week changes, and once cloud is ready, so posts reflect quickly.
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        let fills = {};
        if (window.SUPABASE_CONFIGURED && window.loadStandupFills) {
          fills = await window.loadStandupFills();
        } else if (window.loadLocalStandupFills) {
          fills = window.loadLocalStandupFills();
        }
        if (!cancelled) setStandupFills(fills || {});
      } catch (e) { console.error("loadStandupFills", e); }
    })();
    return () => { cancelled = true; };
  }, [view, weekIdx, cloudReady]);

  // State handed to the views = persisted state + derived standup fills.
  const stateForViews = React.useMemo(() => ({ ...state, standupFills }), [state, standupFills]);

  // Apply tweaks to root
  useEffect(() => {
    document.documentElement.dataset.accent  = tweaks.accent;
    document.documentElement.dataset.density = tweaks.density;
    document.documentElement.dataset.layout  = tweaks.layout;
    document.documentElement.style.setProperty("--deliv-count", DELIVERABLES.length);
  }, [tweaks]);

  const onCheck = (repId, weekId, delId) => {
    if (effectiveUser && !isManager && repId !== myRepId) return; // peer view = read-only
    const k = checkKey(repId, weekId, delId);
    const wasChecked = !!state.checks[k];
    const now = new Date().toISOString();
    // Build markedBy attribution from current auth
    let markedBy = undefined;
    if (effectiveUser) {
      const meRep = REPS.find(r => r.id === myRepId);
      markedBy = {
        email: effectiveUser.authEmail,
        name: isManager ? (effectiveUser.authEmail.split("@")[0]) : (meRep ? meRep.name : effectiveUser.authEmail),
        role: isManager ? "manager" : "rep",
      };
    }
    // Optimistic local update
    setState(s => {
      const checks = { ...s.checks };
      if (checks[k]) delete checks[k];
      else checks[k] = wasChecked ? null : { at: now, markedBy: markedBy ? { ...markedBy, at: now } : undefined };
      return { ...s, checks };
    });
    // Write through to Supabase
    if (useCloud) {
      window.toggleCheckSupabase(repId, weekId, delId, wasChecked, markedBy).catch(console.error);
    }
  };

  const onSaveNote = (repId, weekId, delId, note) => {
    if (!isManager) return; // RLS will block anyway, but bail early
    const k = `${repId}|${weekId}|${delId}`;
    setState(s => {
      const managerNotes = { ...(s.managerNotes || {}) };
      if (!note || !note.trim()) delete managerNotes[k];
      else managerNotes[k] = { note: note.trim(), updated_by: (authedUser || effectiveUser).authEmail, updated_at: new Date().toISOString() };
      return { ...s, managerNotes };
    });
    if (useCloud) {
      window.setManagerNoteSupabase(repId, weekId, delId, note, (authedUser || effectiveUser).authEmail).catch(console.error);
    }
  };

  const onAsk = (repId, weekId, delId, text) => {
    if (effectiveUser && !isManager && repId !== myRepId) return; // peer view = read-only
    const k = `${repId}|${weekId}|${delId}`;
    setState(s => {
      const asks = { ...(s.asks || {}) };
      const resolvedAsks = { ...(s.resolvedAsks || {}) };
      if (!text) {
        // Soft-resolve locally: move the open ask into resolvedAsks so the
        // history view updates instantly; realtime will then reconcile.
        const prev = asks[k];
        if (prev) {
          resolvedAsks[k] = {
            text: prev.text,
            raisedAt: prev.at,
            resolvedAt: new Date().toISOString(),
            resolvedBy: authedUser
              ? {
                  email: authedUser.authEmail,
                  name: authedUser.authEmail.split("@")[0],
                  role: isManager ? "manager" : "rep",
                }
              : null,
            response: prev.response,
          };
        }
        delete asks[k];
      } else {
        // Preserve the manager response across rep edits of the ask body
        const prev = asks[k];
        asks[k] = { text, at: new Date().toISOString() };
        if (prev && prev.response) asks[k].response = prev.response;
        // Re-raising clears any prior resolution in the local mirror;
        // the upsert in setAskSupabase clears resolved_at server-side.
        delete resolvedAsks[k];
      }
      return { ...s, asks, resolvedAsks };
    });
    if (useCloud) {
      const resolvedBy = authedUser
        ? {
            email: authedUser.authEmail,
            name: authedUser.authEmail.split("@")[0],
            role: isManager ? "manager" : "rep",
          }
        : null;
      window.setAskSupabase(repId, weekId, delId, text, resolvedBy).catch(console.error);
    }
  };

  // Standup → manager flag. When a rep @-mentions the manager in a standup,
  // raise a flag in the same Open-Flags system (delId "standup") so the manager
  // can respond + resolve it just like a weekly-page flag. Guard: a flag the
  // manager already resolved won't resurrect unless the mention text changes.
  const onStandupFlag = (repId, weekId, text) => {
    const delId = "standup";
    const k = `${repId}|${weekId}|${delId}`;
    const trimmed = (text || "").trim();
    if (!trimmed) return;
    let shouldWrite = false;
    setState(s => {
      const asks = { ...(s.asks || {}) };
      const resolvedAsks = { ...(s.resolvedAsks || {}) };
      const openExisting = asks[k];
      const resolvedExisting = resolvedAsks[k];
      // Same text the manager already resolved → leave it closed.
      if (!openExisting && resolvedExisting && resolvedExisting.text === trimmed) return s;
      // No change to an already-open flag → no write.
      if (openExisting && openExisting.text === trimmed) return s;
      const next = { text: trimmed, at: (openExisting && openExisting.at) || new Date().toISOString() };
      if (openExisting && openExisting.response) next.response = openExisting.response;
      asks[k] = next;
      if (resolvedExisting) delete resolvedAsks[k];
      shouldWrite = true;
      return { ...s, asks, resolvedAsks };
    });
    if (shouldWrite && useCloud) {
      const resolvedBy = authedUser
        ? { email: authedUser.authEmail, name: authedUser.authEmail.split("@")[0], role: isManager ? "manager" : "rep" }
        : null;
      window.setAskSupabase(repId, weekId, delId, trimmed, resolvedBy).catch(console.error);
    }
  };

  // Onboarding access note → Open Flags. When Don logs a problem on a specific
  // login/access item, raise it in the same flag queue the manager already
  // works (delId "onboarding:<itemId>"); clearing the note resolves it.
  const onAccessFlag = (itemId, systemLabel, text) => {
    const weekId = WEEKS[weekIdx].id;
    const delId = "onboarding:" + itemId;
    const body = (text && text.trim())
      ? `Onboarding access — ${systemLabel}: ${text.trim()}`
      : "";
    onAsk("don", weekId, delId, body);
  };

  const onReopenAsk = (repId, weekId, delId) => {
    if (!isManager) return; // manager-only action
    const k = `${repId}|${weekId}|${delId}`;
    setState(s => {
      const asks = { ...(s.asks || {}) };
      const resolvedAsks = { ...(s.resolvedAsks || {}) };
      const prev = resolvedAsks[k];
      if (prev) {
        asks[k] = { text: prev.text, at: prev.raisedAt || new Date().toISOString() };
        if (prev.response) asks[k].response = prev.response;
        delete resolvedAsks[k];
      }
      return { ...s, asks, resolvedAsks };
    });
    if (useCloud && window.reopenAskSupabase) {
      window.reopenAskSupabase(repId, weekId, delId).catch(console.error);
    }
  };

  const onAskResponse = (repId, weekId, delId, text) => {
    if (!isManager) return; // RLS blocks anyway; bail early
    const k = `${repId}|${weekId}|${delId}`;
    const trimmed = (text || "").trim();
    const markedBy = authedUser
      ? { email: authedUser.authEmail, name: authedUser.authEmail.split("@")[0] }
      : null;
    setState(s => {
      const asks = { ...(s.asks || {}) };
      const existing = asks[k];
      if (!existing) return s; // can only respond to an existing flag
      if (!trimmed) {
        const { response, ...rest } = existing;
        asks[k] = rest;
      } else {
        asks[k] = {
          ...existing,
          response: {
            text: trimmed,
            byEmail: markedBy ? markedBy.email : null,
            byName:  markedBy ? markedBy.name  : null,
            at: new Date().toISOString(),
          },
        };
      }
      return { ...s, asks };
    });
    if (useCloud) {
      window.setAskResponseSupabase(repId, weekId, delId, trimmed, markedBy).catch(console.error);
    }
  };

  const todayStr = `${DAYS[TODAY.getDay()]} · ${fmtLong(TODAY)}`;

  const activeRep = REPS.find(r => r.id === view) || null;

  return (
    <div className="app">
      <nav className="shell-nav">
        <div className="shell-nav__brand" onClick={() => setView("home")} style={{ cursor: "pointer" }}>
          <span className="shell-nav__brand-mark">
            <img src={document.getElementById("__logo_src").src} alt="Mindtools Kineo" />
          </span>
          <span>Mindtools Kineo</span>
          <small>Weekly Review · {activeTeamObj.short}</small>
        </div>
        <div className="shell-nav__right">
          {myTeams.length > 1 && (
            <div className="ws-switch" role="tablist" aria-label="Workspace">
              {myTeams.map(id => {
                const t = TEAMS.find(x => x.id === id);
                return (
                  <button key={id} className="ws-switch__btn" role="tab"
                    data-active={activeTeam === id ? "1" : "0"}
                    aria-selected={activeTeam === id}
                    onClick={() => setActiveTeam(id)}>
                    {t ? t.short : id}
                  </button>
                );
              })}
            </div>
          )}
          {(isManager || isPreview) && (
            <div className="viewas" style={{ position: "relative" }}>
              <button className="viewas__btn" onClick={() => setViewAsOpen(o => !o)}>
                {isManager
                  ? (effectiveUser && effectiveUser.role === "team_admin"
                      ? <><span className="me-badge__role" style={{marginRight:4}}>{activeTeamObj.short} Manager</span>{(effectiveUser.authEmail || "").split("@")[0]}</>
                      : <><span className="me-badge__role" style={{marginRight:4}}>Manager</span>Jeff</>)
                  : (() => { const r = REPS.find(x => x.id === myRepId); return r ? <><Avatar rep={r} size={18}/><span style={{marginLeft:5}}>{r.name.split(" ")[0]}</span></> : "You"; })()
                }
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{marginLeft:4}}><path d="M6 9l6 6 6-6"/></svg>
              </button>
              {viewAsOpen && (
                <div className="viewas__menu">
                  <div className="viewas__menu-label">View as</div>
                  <button className={"viewas__item" + (!devViewAs && isManager ? " is-active" : "")}
                    onClick={() => { setDevViewAs({ role:"manager", rep_id:"", authEmail:"jeff.hamons@mindtools.com" }); setViewAsOpen(false); setView("home"); }}>
                    <span className="me-badge__role" style={{fontSize:10}}>MGR</span> Jeff Hamons
                  </button>
                  <button className={"viewas__item" + (devViewAs && devViewAs.role === "team_admin" ? " is-active" : "")}
                    onClick={() => { setDevViewAs({ role:"team_admin", rep_id:"", adminScopes:[{team_id:"cs",region:"US"},{team_id:"cs",region:"EMEA"}], authEmail:"lkidd@mindtools.com" }); setViewAsOpen(false); setView("home"); }}>
                    <span className="me-badge__role" style={{fontSize:10}}>CS</span> Lara Kidd
                  </button>
                  {REPS.filter(r => r.name !== "TBD" && repVisibleInWeek(r, WEEKS[weekIdx].index)).map(r => (
                    <button key={r.id} className={"viewas__item" + (myRepId === r.id && !isManager ? " is-active" : "")}
                      onClick={() => { setDevViewAs({ role:"rep", rep_id: r.id, authEmail: r.id+"@mindtools.com" }); setViewAsOpen(false); setView("home"); }}>
                      <Avatar rep={r} size={16}/> {r.name}
                    </button>
                  ))}
                </div>
              )}
            </div>
          )}
          {effectiveUser ? (
            <div className="me-badge">
              {isManager ? (
                <><span className="me-badge__role">{effectiveUser.role === "team_admin" ? `${activeTeamObj.short} Manager` : "Manager"}</span><strong>{(authedUser || effectiveUser).authEmail}</strong></>
              ) : (
                (() => {
                  const meRep = REPS.find(r => r.id === myRepId);
                  return meRep ? <><Avatar rep={meRep} size={22} /><strong>{meRep.name}</strong></> : <strong>{(authedUser || effectiveUser).authEmail}</strong>;
                })()
              )}
              <span className={"me-badge__dot " + (cloudReady ? "is-live" : "is-loading")}
                    title={cloudReady ? "Live · synced" : "Connecting…"} />
              <button className="me-badge__signout" onClick={() => window.signOut()}>Sign out</button>
            </div>
          ) : (
            <span>Lead: <strong>You</strong></span>
          )}
          <span className="shell-nav__date">{todayStr}</span>
        </div>
      </nav>

      <div className="tabs" data-screen-label="00 Tabs">
        {/* Static pages from registry, filtered by role */}
        {APP_PAGES
          .filter(p => p.requires === "any"
            || (p.requires === "manager" && isManager)
            // Don is a newbiz rep — his onboarding tab belongs to that workspace.
            || (p.requires === "don-or-manager" && (isManager || myRepId === "don") && activeTeam === "newbiz"))
          .map(page => {
            const isActive = view === page.id;
            // Compute optional badge (e.g. open flag count)
            let badge = null;
            if (page.id === "manager:flags" && state.asks) {
              // Onboarding access asks (delId "onboarding:…") are surfaced on the
              // Home strip + the Don — Onboarding view, and the FlagQueue page
              // skips them (no matching DELIVERABLE). Exclude them here so this
              // badge can't show a count the FlagQueue page won't render.
              // Workspace-scoped: only the active team's flags count.
              const openCount = Object.entries(state.asks).filter(([k, a]) => {
                if (!a || !a.text || state.checks[k] || k.includes("|onboarding:")) return false;
                const flagRep = repById(k.split("|")[0]);
                return flagRep && flagRep.team === activeTeam;
              }).length;
              if (openCount > 0) badge = <span className="tabs__badge">{openCount}</span>;
            }
            return (
              <button
                key={page.id}
                className="tabs__tab"
                data-active={isActive ? "1" : "0"}
                onClick={() => setView(page.id)}
              >
                <span className="tabs__icon"><Icon name={page.icon} size={14} /></span>
                {page.label}
                {badge}
              </button>
            );
          })
        }
        {/* Rep tabs — only shown in weekly review context */}
        {(view === "rollup" || REPS.some(r => r.id === view)) && (<>
          <span className="tabs__divider" aria-hidden="true" />
          {REPS.filter(rep => rep.team === activeTeam && repVisibleInWeek(rep, WEEKS[weekIdx].index)).map(rep => (
            <button
              key={rep.id}
              className="tabs__tab"
              data-active={view === rep.id ? "1" : "0"}
              onClick={() => setView(rep.id)}
            >
              <Avatar rep={rep} size={22} />
              {rep.name.split(" ")[0]}
            </button>
          ))}
        </>)}
      </div>

      <main className="app__main">
        <div className="app__inner">
          {view === "home" ? (
            <div data-screen-label="00 Home">
              <HomeView
                state={stateForViews}
                weekIdx={weekIdx}
                isManager={isManager}
                myRepId={myRepId}
                authedUser={effectiveUser}
                setView={setView}
                activeTeam={activeTeam}
              />
            </div>
          ) : view === "rollup" ? (
            <div data-screen-label="01 Team Rollup">
              <TeamRollup
                state={stateForViews}
                weekIdx={weekIdx}
                setWeekIdx={setWeekIdx}
                onPickRep={(id) => setView(id)}
                activeTeam={activeTeam}
              />
            </div>
          ) : view === "leaderboard" ? (
            <LeaderboardView authedUser={effectiveUser} activeTeam={activeTeam} />
          ) : view === "standup" ? (
            <div data-screen-label="02 Standup">
              <StandupView authedUser={effectiveUser} onStandupFlag={onStandupFlag} activeTeam={activeTeam} />
            </div>
          ) : view === "wins" ? (
            <div data-screen-label="04 Weekly Wins">
              <WinsFormView
                authedUser={effectiveUser}
                activeTeam={activeTeam}
              />
            </div>
          ) : view === "manager:flags" ? (
            <FlagQueue
              state={state}
              activeTeam={activeTeam}
              onPickRep={(repId, weekId) => {
                if (weekId) {
                  const idx = WEEKS.findIndex(w => w.id === weekId);
                  if (idx >= 0) setWeekIdx(idx);
                }
                setView(repId);
              }}
              onReopenAsk={onReopenAsk}
            />
          ) : view === "don:onboarding" ? (
            typeof DonOnboarding !== "undefined"
              ? <DonOnboarding viewerIsManager={isManager} viewerRepId={myRepId} onFlag={onAccessFlag} />
              : null
          ) : activeRep ? (
            <div data-screen-label={`02 Rep · ${activeRep.name}`}>
              {isReadOnly && (
                <div className="peer-banner">
                  <span className="peer-banner__dot" aria-hidden="true" />
                  <span>Viewing <strong>{activeRep.name}'s</strong> week — read only.</span>
                  <button className="peer-banner__back" onClick={() => setView(myRepId || "rollup")}>Back to mine</button>
                </div>
              )}
              <RepView
                rep={activeRep}
                state={stateForViews}
                weekIdx={weekIdx}
                setWeekIdx={setWeekIdx}
                onCheck={onCheck}
                onAsk={onAsk}
                onAskResponse={onAskResponse}
                onSaveNote={onSaveNote}
                onBack={() => setView("home")}
                readOnly={isReadOnly}
                isManager={isManager}
                onOpenWins={() => setView("wins")}
                onOpenStandup={() => setView("standup")}
              />
            </div>
          ) : null}
        </div>
      </main>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Accent color">
          <TweakRadio
            value={tweaks.accent}
            options={[
              { value: "purple", label: "Purple" },
              { value: "orange", label: "Orange" },
              { value: "teal",   label: "Teal" },
              { value: "black",  label: "Black" },
            ]}
            onChange={v => setTweak("accent", v)}
          />
        </TweakSection>
        <TweakSection title="Density">
          <TweakRadio
            value={tweaks.density}
            options={[
              { value: "cozy",  label: "Cozy" },
              { value: "comfy", label: "Comfy" },
              { value: "airy",  label: "Airy" },
            ]}
            onChange={v => setTweak("density", v)}
          />
        </TweakSection>
        <TweakSection title="Layout style">
          <TweakRadio
            value={tweaks.layout}
            options={[
              { value: "editorial", label: "Editorial" },
              { value: "compact",   label: "Compact" },
            ]}
            onChange={v => setTweak("layout", v)}
          />
        </TweakSection>
        <TweakSection title="Reset">
          <TweakButton onClick={() => {
            if (confirm("Reset all check states? This affects your local view only.")) {
              localStorage.removeItem(STORAGE_KEY);
              location.reload();
            }
          }}>Clear all checks</TweakButton>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
// isPreview is declared above App so the View-as pill can read it via closure.
if (!isPreview && window.SUPABASE_CONFIGURED && window.AuthGate) {
  root.render(<AuthGate>{({ user, preloadedState }) => <App authedUser={user} preloadedState={preloadedState} />}</AuthGate>);
} else {
  root.render(<App />);
}
</script>
</body>
</html>
