name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python -m pytest tests/test_rfc151_reps_parity.py tests/test_issue_3781_currency_toggle.py -q

  node-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Glob form: the bare directory form (`node --test tests/`) is known to
      # flake and resolve `tests` as a module. See README "How to run locally".
      - run: node --test tests/*.mjs
